<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 | ACCESS_DENIED</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            text-shadow: 0 0 5px #00ff00;
        }
        .error-code { font-size: 5rem; margin: 0; }
        .message { font-size: 1.2rem; margin-bottom: 20px; border-right: 2px solid #00ff00; white-space: nowrap; overflow: hidden; width: 24ch; animation: typing 2s steps(24), blink .5s step-end infinite; }
        @keyframes typing { from { width: 0 } }
        @keyframes blink { 50% { border-color: transparent } }
        .btn { color: #0a0a0a; background: #00ff00; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 3px; }
        .btn:hover { background: #ffffff; box-shadow: 0 0 15px #ffffff; }
    </style>
</head>
<body>
    <h1 class="error-code">404</h1>
    <p class="message">STATUS: TARGET_NOT_FOUND...</p>
    <p>The requested internal resource is unavailable or encrypted.</p>
    <a href="/" class="btn">> RETURN_TO_DASHBOARD</a>
</body>
</html>
